# Anchor workspace config. Replace `player_perps` program id with the key
# emitted by `anchor keys list` after the first `anchor build`.
[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
player_perps = "Fg6PaFpoGXkYsidMpWTK6W2BeZ7FEfcYkg476zPFsLnS"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

# `dev-validate` lets local tests inject a final score without the TxLine CPI,
# so the whole lifecycle (stake → lock → settle → claim) is drivable on a fresh
# localnet with no external program. Never enable it for devnet/mainnet builds.
[test]
startup_wait = 8000

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"
